{% load static %}

<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family: Arial, sans-serif;
background:#f3f3f3;
}

.container{
width:88%;
margin:40px auto;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.hero{
display:grid;
grid-template-columns: 1fr 1fr;
gap:40px;
align-items:center;
}

.title{
font-size:13px;
background:#111;
color:white;
padding:7px 18px;
border-radius:30px;
letter-spacing:2px;
font-weight:600;
display:inline-block;
margin-bottom:20px;
}

.quote{
font-size:46px;
font-weight:700;
line-height:1.1;
}

.accent{
color:#ff6b9d;
}

.button{
margin-top:30px;
display:inline-block;
padding:14px 28px;
background:black;
color:white;
border-radius:30px;
text-decoration:none;
font-weight:600;
}

.image-box{
position:relative;
height:380px;
border-radius:25px;
overflow:hidden;
background:#f0f0f0;
}

.hero-img{
position:absolute;
width:100%;
height:100%;
object-fit:contain;
z-index:1;
}

.big-text{
position:absolute;
top:30px;
left:30px;
font-size:120px;
font-weight:800;
color:rgba(0,0,0,0.06);
z-index:4;
line-height:.8;
pointer-events:none;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:12px;
padding:18px;
z-index:3;
}

.overlay div{
border-radius:18px;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(5px);
}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<div>

<div class="title">
HAYA GEAR
</div>

<div class="quote">

Strength Without Compromise.<br>

<span class="accent">
Performance With Modesty.
</span>

</div>

<a class="button">
Explore Collection →
</a>

</div>


<div class="image-box">

<img src="{% static 'images/hero.svg' %}" class="hero-img">


<div class="overlay">

<div></div>
<div></div>
<div></div>

<div></div>
<div></div>
<div></div>

<div></div>
<div></div>
<div></div>

</div>


<div class="big-text">
HAYA<br>
GEAR
</div>


</div>

</div>

</div>

</body>

</html>
